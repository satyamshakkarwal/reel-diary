<title>Our Little Reel Diary 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg, #ff9ecb, #ffcce6, #ffd6ec);
  color:#fff;
  overflow-x:hidden;
}

/* SOFT GLOW */
.glow{
  position:fixed;
  width:500px;
  height:500px;
  background: radial-gradient(circle, rgba(255,105,180,0.3), transparent);
  filter:blur(120px);
  top:-150px;
  left:50%;
  transform:translateX(-50%);
}

/* FLOATING HEARTS */
.hearts span{
  position:fixed;
  bottom:-20px;
  color:rgba(255,255,255,0.4);
  font-size:20px;
  animation:float 12s linear infinite;
}

.hearts span:nth-child(1){left:10%; animation-delay:0s;}
.hearts span:nth-child(2){left:30%; animation-delay:3s;}
.hearts span:nth-child(3){left:50%; animation-delay:6s;}
.hearts span:nth-child(4){left:70%; animation-delay:2s;}
.hearts span:nth-child(5){left:90%; animation-delay:8s;}

@keyframes float{
  0%{transform:translateY(0); opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-120vh); opacity:0;}
}

/* HEADER */
.header{
  text-align:center;
  padding:70px 20px 30px;
}

.header h1{
  font-size:30px;
  font-weight:600;
  color:#fff;
}

.header p{
  font-size:14px;
  margin-top:10px;
  color:#fff;
  opacity:0.8;
}

/* SECTION */
.section{
  padding:30px 20px;
  max-width:1000px;
  margin:auto;
}

.section-title{
  font-size:16px;
  margin-bottom:15px;
  color:#ff2e86;
}

/* GRID */
.container{
  display:grid;
  gap:22px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.25);
  border-radius:22px;
  padding:10px;
  backdrop-filter:blur(20px);
  box-shadow:0 8px 30px rgba(255,0,120,0.2);
  opacity:0;
  transform:translateY(40px);
  transition:0.5s ease;
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card:hover{
  transform:scale(1.03);
  box-shadow:0 12px 40px rgba(255,0,120,0.35);
}

iframe{
  width:100%;
  height:480px;
  border:none;
  border-radius:16px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:50px 20px;
  font-size:13px;
  color:#fff;
  opacity:0.7;
}

@media(min-width:768px){
  .container{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<script>
const cards = document.querySelectorAll('.card');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
}, { threshold:0.2 });

cards.forEach(card => observer.observe(card));
</script>
