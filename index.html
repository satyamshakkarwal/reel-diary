<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Little Reel Diary 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at top, #ff6b9a, #2b0018 70%);
  color:#fff;
  overflow-x:hidden;
}

/* SOFT FLOATING HEARTS */
.hearts span{
  position:fixed;
  bottom:-20px;
  color:rgba(255,255,255,0.15);
  font-size:18px;
  animation: float 12s linear infinite;
}

.hearts span:nth-child(1){left:10%; animation-delay:0s;}
.hearts span:nth-child(2){left:30%; animation-delay:3s;}
.hearts span:nth-child(3){left:50%; animation-delay:6s;}
.hearts span:nth-child(4){left:70%; animation-delay:2s;}
.hearts span:nth-child(5){left:90%; animation-delay:8s;}

@keyframes float{
  0%{transform:translateY(0); opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-120vh); opacity:0;}
}

/* HEADER */
.header{
  text-align:center;
  padding:90px 20px 40px;
}

.header h1{
  font-size:36px;
  font-weight:700;
  color:#ffffff;
  letter-spacing:1px;
  text-shadow:0 0 25px rgba(255,120,160,0.6);
}

.header p{
  margin-top:12px;
  font-size:15px;
  color:#ffd6e5;
  font-weight:400;
  text-shadow:0 0 10px rgba(255,120,160,0.4);
}

/* SECTION */
.section{
  padding:30px 20px;
  max-width:1000px;
  margin:auto;
}

/* GRID */
.container{
  display:grid;
  gap:24px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.06);
  border-radius:22px;
  padding:10px;
  backdrop-filter: blur(18px);
  box-shadow:0 10px 40px rgba(255,0,120,0.15);
  transition:0.4s ease;
  opacity:0;
  transform:translateY(40px);
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card:hover{
  transform:scale(1.02);
  box-shadow:0 15px 50px rgba(255,0,120,0.3);
}

iframe{
  width:100%;
  height:480px;
  border:none;
  border-radius:16px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:60px 20px;
  font-size:16px;
  font-weight:600;
  color:#ffffff;
  border-bottom:2px solid #ff6b9a;
  display:inline-block;
  text-shadow:0 0 10px rgba(255,120,160,0.5);
}

/* GRID */
@media(min-width:768px){
  .container{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<div class="hearts">
  <span>❤</span><span>❤</span><span>❤</span>
  <span>❤</span><span>❤</span>
</div>

<div class="header">
  <h1>Our Little Reel Diary 💖</h1>
  <p>proof that we said we’ll recreate these…</p>
</div>

<div class="section">
  <div class="container">

    <!-- YOUR REELS -->
    <div class="card"><iframe src="https://www.instagram.com/reel/DT-VVPCiJ65/embed"></iframe></div>
    <div class="card"><iframe src="https://www.instagram.com/reel/DUKlaD-CpOd/embed"></iframe></div>
    <div class="card"><iframe src="https://www.instagram.com/reel/DWvMMRyiAF5/embed"></iframe></div>
    <div class="card"><iframe src="https://www.instagram.com/reel/DUhZZwzgfz1/embed"></iframe></div>
    <div class="card"><iframe src="https://www.instagram.com/reel/DXeMEj8DB3M/embed"></iframe></div>
    <div class="card"><iframe src="https://www.instagram.com/reel/DWlPYdQjs5S/embed"></iframe></div>
    <div class="card"><iframe src="https://www.instagram.com/reel/DTW98tXk8EY/embed"></iframe></div>
    <div class="card"><iframe src="https://www.instagram.com/reel/DYMUhZChq0D/embed"></iframe></div>
    <div class="card"><iframe src="https://www.instagram.com/reel/DWb_jloBGIa/embed"></iframe></div>

  </div>
</div>

<div style="text-align:center;">
  <div class="footer">
    we’re actually doing these someday… right? ❤️
  </div>
</div>

<script>
const cards = document.querySelectorAll('.card');

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
},{threshold:0.2});

cards.forEach(card=>observer.observe(card));
</script>

</body>
</html>
