<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Our Little Reel Diary 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at top, #ff2e63, #1a0010 70%);
  color:#fff;
  overflow-x:hidden;
}

/* FLOATING HEARTS */
.hearts span{
  position:fixed;
  bottom:-20px;
  color:rgba(255,80,120,0.25);
  font-size:18px;
  animation: float 10s linear infinite;
}

.hearts span:nth-child(1){left:10%; animation-delay:0s;}
.hearts span:nth-child(2){left:25%; animation-delay:2s;}
.hearts span:nth-child(3){left:40%; animation-delay:4s;}
.hearts span:nth-child(4){left:60%; animation-delay:1s;}
.hearts span:nth-child(5){left:75%; animation-delay:3s;}
.hearts span:nth-child(6){left:90%; animation-delay:5s;}

@keyframes float{
  0%{transform:translateY(0); opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-120vh); opacity:0;}
}

/* HEADER */
.header{
  text-align:center;
  padding:80px 20px 40px;
}

.header h1{
  font-size:34px;
  font-weight:700;
  color:#ff4d6d;
  text-shadow:0 0 20px rgba(255,0,80,0.6);
}

.header p{
  margin-top:10px;
  font-size:15px;
  font-weight:500;
  color:#ffd6dc;
  text-shadow:0 0 10px rgba(255,0,80,0.4);
}

/* SECTION */
.section{
  padding:30px 20px;
  max-width:1000px;
  margin:auto;
}

.container{
  display:grid;
  gap:24px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.05);
  border-radius:22px;
  padding:10px;
  backdrop-filter: blur(15px);
  box-shadow:0 10px 40px rgba(255,0,80,0.2);
  transition:0.4s ease;
  opacity:0;
  transform:translateY(40px);
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card:hover{
  transform:scale(1.02);
  box-shadow:0 15px 50px rgba(255,0,80,0.4);
}

iframe{
  width:100%;
  height:480px;
  border:none;
  border-radius:16px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:60px 20px;
  font-size:16px;
  font-weight:600;
  color:#ff4d6d;
  text-decoration: underline;
  text-underline-offset:6px;
  text-shadow:0 0 15px rgba(255,0,80,0.6);
}

/* GRID */
@media(min-width:768px){
  .container{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<div class="hearts">

<script>
const cards = document.querySelectorAll('.card');

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
},{threshold:0.2});

cards.forEach(card=>observer.observe(card));
</script>
