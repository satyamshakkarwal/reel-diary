<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Little Reel Diary 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: radial-gradient(circle at top, #ff6b9a, #1a0010 70%);
  color:#fff;
  overflow-x:hidden;
}

/* HEART RAIN */
.hearts{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}

.hearts span{
  position:absolute;
  color:rgba(255,120,160,0.25);
  font-size:14px;
  animation: rain linear infinite;
}

@keyframes rain{
  0%{ transform:translateY(-10vh); opacity:0; }
  10%{ opacity:1; }
  100%{ transform:translateY(110vh); opacity:0; }
}

/* HEADER */
.header{
  text-align:center;
  padding:90px 20px 40px;
  position:relative;
  z-index:2;
}

.header h1{
  font-size:36px;
  font-weight:700;
  color:#fff;
  text-shadow:0 0 25px rgba(255,120,160,0.6);
}

.header p{
  margin-top:10px;
  font-size:15px;
  color:#ffd6e5;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:10px 20px;
  border-radius:30px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.3);
  color:#fff;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:rgba(255,255,255,0.2);
}

/* SECTION */
.section{
  padding:30px 20px;
  max-width:1000px;
  margin:auto;
  position:relative;
  z-index:2;
}

.container{
  display:grid;
  gap:24px;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.06);
  border-radius:22px;
  padding:10px;
  backdrop-filter: blur(18px);
  box-shadow:0 10px 40px rgba(255,0,120,0.15);
  transition:0.4s;
  opacity:0;
  transform:translateY(40px);
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card:hover{
  transform:scale(1.02);
  box-shadow:0 15px 50px rgba(255,0,120,0.3);
}

iframe{
  width:100%;
  height:480px;
  border:none;
  border-radius:16px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:60px 20px;
  font-size:16px;
  font-weight:600;
  color:#fff;
  border-bottom:2px solid #ff6b9a;
  display:inline-block;
}

/* GRID */
@media(min-width:768px){
  .container{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<!-- HEARTS -->
<div class="hearts" id="hearts"></div>

<div class="header">
  <h1>Our Little Reel Diary 💖</h1>
  <p>proof that we said we’ll recreate these…</p>

  <a href="#reels" class="btn">see more ↓</a>
</div>

<div class="section" id="reels">
  <div class="container">

    <!-- ALL REELS -->

</div>

<div style="text-align:center;">
  <div class="footer">
    we’re actually doing these someday… right? ❤️
  </div>

<script>
/* SCROLL ANIMATION */
const cards = document.querySelectorAll('.card');
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});
cards.forEach(card=>observer.observe(card));

/* HEART RAIN GENERATOR */
const container = document.getElementById('hearts');

for(let i=0;i<60;i++){
  let heart = document.createElement('span');
  heart.innerHTML = '❤';

  heart.style.left = Math.random()*100 + 'vw';
  heart.style.animationDuration = (5 + Math.random()*5) + 's';
  heart.style.fontSize = (10 + Math.random()*20) + 'px';

  container.appendChild(heart);
}
</script>

</body>
</html>
